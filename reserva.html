<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Nueva Reserva</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 30px;
            background-color: #f7f7f7;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .top-bar {
            display: flex;
            gap: 10px;
            margin: 0 auto 20px auto;
            width: 90%;
        }

        .btn-accion {
            padding: 8px 16px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: white;
        }

        .btn-reservas { background-color: #1f6feb; }
        .btn-clientes { background-color: #777; }
        .btn-canchas  { background-color: purple; }

        .contenedor-form {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px 25px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.2);
        }

        .fila {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        select, input {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #999;
            box-sizing: border-box;
        }

        .fila-doble {
            display: flex;
            gap: 10px;
        }

        .fila-doble .col {
            flex: 1;
        }

        .error {
            color: red;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .btn-confirmar {
            background-color: green;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-centrado {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <h1>Registrar Nueva Reserva</h1>

    <!-- BARRA SUPERIOR -->
    <div class="top-bar">
        <a href="{{ url_for('reservas_data_list') }}">
            <button class="btn-accion btn-reservas">Ver Reservas Registradas</button>
        </a>

        <a href="{{ url_for('mostrar_registro_clientes') }}">
            <button class="btn-accion btn-clientes">Clientes</button>
        </a>

        <a href="{{ url_for('mostrar_registro_canchas') }}">
            <button class="btn-accion btn-canchas">Canchas</button>
        </a>
    </div>

    <div class="contenedor-form">

        <!-- MENSAJE DE ERROR (por ej. cancha no disponible) -->
        {% if error_msg %}
            <div class="error">{{ error_msg }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('insertar_reserva') }}">

            <!-- Cliente -->
            <div class="fila">
                <label for="id_cliente">Cliente:</label>
                <select id="id_cliente" name="id_cliente" required>
                <option value="">-- Seleccionar Cliente --</option>
                {% for c in clientes %}
                <option value="{{ c.ID_CLIENTE }}">
            {{ c.NOMBRE_COMPLETO }}
        </option>
    {% endfor %}
</select>

            </div>

            <!-- Cancha -->
            <div class="fila">
                <label for="id_cancha">Cancha:</label>
                <select id="id_cancha" name="id_cancha" required>
                    <option value="">-- Seleccionar Cancha --</option>
                    {% for ca in canchas %}
                        <option value="{{ ca.ID_CANCHA }}">
                            {{ ca.NOMBRE_CANCHA }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Fecha -->
            <div class="fila">
                <label for="fecha_reserva">Fecha de Reserva:</label>
                <input type="date" id="fecha_reserva" name="fecha_reserva" required>
            </div>

            <!-- Horas -->
 <!-- Horas -->
<div class="fila fila-doble">
    <div class="col">
        <label for="hora_inicio">Hora Inicio:</label>
        <select name="hora_inicio" id="hora_inicio" required>
            <option value="">-- Seleccionar hora --</option>
            <option value="10:00">10:00</option>
            <option value="11:00">11:00</option>
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00">14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00">17:00</option>
            <option value="18:00">18:00</option>
            <option value="19:00">19:00</option>
            <option value="20:00">20:00</option>
            <option value="21:00">21:00</option>
            <option value="22:00">22:00</option>
        </select>
    </div>

    <div class="col">
        <label for="hora_fin">Hora Fin:</label>
        <select name="hora_fin" id="hora_fin" required>
            <option value="">-- Seleccionar hora --</option>
            <option value="11:00">11:00</option>
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00">14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00">17:00</option>
            <option value="18:00">18:00</option>
            <option value="19:00">19:00</option>
            <option value="20:00">20:00</option>
            <option value="21:00">21:00</option>
            <option value="22:00">22:00</option>
            <option value="23:00">23:00</option>
        </select>
    </div>
</div>


            <!-- Monto -->
            <div class="fila">
                <label for="monto_total">Monto Total:</label>
                <input type="number" id="monto_total" name="monto_total" step="0.01" min="0" required>
            </div>

            <!-- Modo de pago y estado -->
            <div class="fila fila-doble">
                <div class="col">
                    <label for="modo_pago">Modo de Pago:</label>
                    <input type="text" id="modo_pago" name="modo_pago" placeholder="Efectivo, Transferencia, etc." required>
                </div>

                <div class="col">
                    <label for="estado_pago">Estado de Pago:</label>
                    <select id="estado_pago" name="estado_pago" required>
                        <option value="Pendiente">Pendiente</option>
                        <option value="Pagado">Pagado</option>
                    </select>
                </div>
            </div>

            <!-- BOTÓN CONFIRMAR -->
            <div class="btn-centrado">
                <button type="submit" class="btn-confirmar">Confirmar Reserva</button>
            </div>

        </form>
    </div>

</body>
</html>
