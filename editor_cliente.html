<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cliente</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">
    <h2 class="mb-4">Editar Cliente</h2>

    <!-- Mensaje de error -->
    {% if error_msg %}
    <div class="alert alert-danger">{{ error_msg }}</div>
    {% endif %}

    <form action="{{ url_for('actualizar_cliente', cliente_id=cliente.ID_CLIENTE) }}" method="POST" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control"
                   value="{{ cliente.NOMBRE }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" class="form-control"
                   value="{{ cliente.APELLIDO }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">RUT</label>
            <input type="text" name="rut" class="form-control"
                   value="{{ cliente.RUT }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" name="telefono" class="form-control"
                   value="{{ cliente.TELEFONO }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" name="correo_electronico" class="form-control"
                   value="{{ cliente.CORREO_ELECTRONICO }}" required>
        </div>

        <div class="d-flex justify-content-between">
            <a href="{{ url_for('clientes_data_list') }}" class="btn btn-secondary">
                Volver a la lista
            </a>

            <button type="submit" class="btn btn-primary">
                Guardar Cambios
            </button>
        </div>

    </form>
</div>

</body>
</html>
